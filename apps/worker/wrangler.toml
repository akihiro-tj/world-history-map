name = "world-history-map-tiles"
main = "src/index.ts"
compatibility_date = "2025-12-01"
minify = true

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "world-history-map-tiles"

[vars]
ALLOWED_ORIGINS = "https://world-history-map.pages.dev,https://*.world-history-map.pages.dev"

# --- Production environment (world-history-map-tiles-prod bucket) ---
[env.production]
[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "world-history-map-tiles-prod"

[env.production.vars]
ALLOWED_ORIGINS = "https://world-history-map.pages.dev,https://*.world-history-map.pages.dev"

# --- Preview environment (world-history-map-tiles-dev bucket) ---
[env.preview]
[[env.preview.r2_buckets]]
binding = "BUCKET"
bucket_name = "world-history-map-tiles-dev"

[env.preview.vars]
ALLOWED_ORIGINS = "https://*.world-history-map.pages.dev"
